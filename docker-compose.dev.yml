services:
  client:
    build:
      context: ./client
      args:
        - VITE_MODE=development
      dockerfile: Dockerfile
    container_name: client
    ports:
      - 8081:80
    restart: unless-stopped
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: server
    environment:
      - APP_ENV=development
    depends_on:
      - db
    restart: unless-stopped
  db:
    image: postgres
    container_name: postgres
    environment:
      POSTGRES_DB: mydatabase
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - 5432:5432
    volumes:
      - ./server/database/postgres-data:/var/lib/postgresql
    restart: unless-stopped
